<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15141c"/>
      <stop offset="100%" stop-color="#0c0b10"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8b7535"/>
    </linearGradient>
    <filter id="f">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shield -->
  <path d="M32 4 L56 16 L56 34 C56 48 44 58 32 62 C20 58 8 48 8 34 L8 16 Z" fill="url(#bg)" stroke="url(#glow)" stroke-width="2"/>
  <!-- Radar rings -->
  <circle cx="32" cy="32" r="6" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.2"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.15"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>
  <!-- Radar sweep -->
  <path d="M32 32 L32 14 A18 18 0 0 1 47 25 Z" fill="url(#glow)" opacity="0.15" filter="url(#f)"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#c9a84c" filter="url(#f)"/>
  <!-- WiFi arcs -->
  <path d="M26 20 a8 8 0 0 1 12 0" stroke="#44d97f" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M22 16 a14 14 0 0 1 20 0" stroke="#3ea8f5" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Diamond -->
  <polygon points="32,46 36,50 32,54 28,50" fill="#c9a84c" opacity="0.4"/>
</svg>
